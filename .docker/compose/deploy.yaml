services:
    app_deployment:
        build:
            context: ./../../
            dockerfile: ./.docker/app/Dockerfile
            target: production
            args:
                APP_VERSION: '${APP_TAG:-dev}'
        image: '${APP_IMAGE:-sail-8.5/app}:${APP_TAG:-latest}'
        environment:
            WWWUSER: '${WWWUSER}'
            WWWGROUP: '${WWWGROUP}'
            APP_ENV: production
            APP_DEBUG: 'false'
            LOG_LEVEL: info
            APP_VERSION: '${APP_TAG:-dev}'
        volumes:
            - './../../.env:/var/www/html/.env'
            - 'app_storage:/var/www/html/storage'
            - 'app_cache:/var/www/html/bootstrap/cache'
            - 'nginx_public:/var/www/html/public/nginx'
        networks:
            - matrix_network
        healthcheck:
            test: [ "CMD-SHELL", "pidof php-fpm || pidof php-fpm8.5 || exit 1" ]
            retries: 10
            timeout: 5s
            interval: 10s
            start_period: 20s

networks:
    matrix_network:
        driver: bridge

volumes:
    app_storage:
        driver: local
    app_cache:
        driver: local
    nginx_public:
        driver: local
